{% extends 'base.html' %}
{% block content %}
  <div class="marketplace">
    <aside class="filters card">
      <h3 style="margin-top:0;">筛选条件</h3>
      <form method="get"
            hx-get="{{ url_for('marketplace') }}"
            hx-target="#marketplace-results"
            hx-swap="innerHTML"
            hx-push-url="true"
            hx-indicator="#mp-spinner">
        <div class="field">
          <label>分类</label>
          <select class="input" name="category">
            <option value="">全部</option>
            {% for c in categories %}
              <option value="{{ c }}" {% if filters.category == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>位置</label>
          <input class="input" type="text" name="location" value="{{ filters.location }}" placeholder="城市/区域" />
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label>最低价格</label>
            <input class="input" type="number" step="0.01" name="min_price" value="{{ filters.min_price }}" />
          </div>
          <div class="field">
            <label>最高价格</label>
            <input class="input" type="number" step="0.01" name="max_price" value="{{ filters.max_price }}" />
          </div>
        </div>
        <div class="field" style="display:flex; align-items:center; gap:.6rem;">
          <input type="checkbox" name="include_volunteer" id="include_volunteer" {% if filters.include_volunteer %}checked{% endif %} />
          <label for="include_volunteer" style="margin:0;">包含志愿服务/免费</label>
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label>开始日期</label>
            <input class="input" type="date" name="start_date" value="{{ filters.start_date }}" />
          </div>
          <div class="field">
            <label>结束日期</label>
            <input class="input" type="date" name="end_date" value="{{ filters.end_date }}" />
          </div>
        </div>
        <div class="field">
          <label>排序方式</label>
          <select class="input" name="sort">
            <option value="newest" {% if filters.sort == 'newest' %}selected{% endif %}>最新</option>
            <option value="urgent" {% if filters.sort == 'urgent' %}selected{% endif %}>紧急</option>
            <option value="price_high_low" {% if filters.sort == 'price_high_low' %}selected{% endif %}>价格：从高到低</option>
            <option value="price_low_high" {% if filters.sort == 'price_low_high' %}selected{% endif %}>价格：从低到高</option>
          </select>
        </div>
        <div class="actions">
          <button class="btn" type="submit"><i class="fa-solid fa-filter"></i> 应用</button>
          <a class="btn secondary" href="{{ url_for('marketplace') }}">重置</a>
          <span id="mp-spinner" class="htmx-indicator"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </div>
      </form>
    </aside>

    <section class="results">
      <div class="hero">
        <h2>互助广场</h2>
        <p class="muted">浏览公开的求助并提供你的帮助，包含付费任务与志愿服务。</p>
      </div>

      {% if vol_stats %}
      <div style="display:flex; gap:1rem; margin-bottom:1.2rem; flex-wrap:wrap;">
        <div class="card" style="flex:1; min-width:120px; text-align:center; padding:0.8rem;">
          <div style="font-size:1.3rem; font-weight:700; color:var(--accent);">{{ vol_stats.est_hours }}</div>
          <div class="muted" style="font-size:0.75rem;">志愿贡献时长</div>
        </div>
        <div class="card" style="flex:1; min-width:120px; text-align:center; padding:0.8rem;">
          <div style="font-size:1.3rem; font-weight:700; color:var(--success);">{{ vol_stats.people_helped }}</div>
          <div class="muted" style="font-size:0.75rem;">已帮助人数</div>
        </div>
        <div class="card" style="flex:1; min-width:120px; text-align:center; padding:0.8rem;">
          <div style="font-size:1.3rem; font-weight:700; color:var(--accent-2);">{{ vol_stats.active_volunteers }}</div>
          <div class="muted" style="font-size:0.75rem;">活跃志愿者</div>
        </div>
      </div>
      {% endif %}

      <div id="marketplace-results">
        {% include 'partials/marketplace_results.html' %}
      </div>
    </section>
  </div>
{% endblock %}
