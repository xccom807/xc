{% extends 'base.html' %}
{% block content %}
<div style="max-width:900px;margin:0 auto;padding:2rem 0;">
  <h2 style="text-align:center;margin-bottom:1.5rem;"><i class="fa-solid fa-magnifying-glass"></i> 搜索</h2>

  <form method="get" action="{{ url_for('search_page') }}"
        hx-get="{{ url_for('search_page') }}"
        hx-target="#search-results"
        hx-swap="innerHTML"
        hx-indicator="#search-spinner"
        hx-push-url="true"
        style="display:flex;gap:.5rem;margin-bottom:2rem;">
    <input type="text" name="q" value="{{ q }}" class="input" placeholder="搜索求助、用户..." style="flex:1;"
           hx-get="{{ url_for('search_page') }}"
           hx-target="#search-results"
           hx-swap="innerHTML"
           hx-trigger="keyup changed delay:400ms"
           hx-include="closest form"
           hx-indicator="#search-spinner" />
    <select name="type" class="input" style="width:auto;">
      <option value="all" {% if search_type == 'all' %}selected{% endif %}>全部</option>
      <option value="requests" {% if search_type == 'requests' %}selected{% endif %}>求助</option>
      <option value="users" {% if search_type == 'users' %}selected{% endif %}>用户</option>
    </select>
    <button type="submit" class="btn"><i class="fa-solid fa-search"></i> 搜索</button>
    <span id="search-spinner" class="htmx-indicator" style="align-self:center;"><i class="fa-solid fa-spinner fa-spin"></i></span>
  </form>

  <div id="search-results">
    {% include 'partials/search_results.html' %}
  </div>
</div>
{% endblock %}
